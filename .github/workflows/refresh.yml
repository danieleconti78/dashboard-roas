name: refresh
on:
  push:
    branches: [main]           # ogni volta che mando il codice -> il sito si ripubblica DA SOLO
  schedule:
    - cron: '30 4 * * *'      # ~06:30 ora italiana (estate). GitHub può ritardare di qualche minuto.
  workflow_dispatch:           # esecuzione manuale dal sito GitHub
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Scrivi i segreti dai GitHub Secrets
        env:
          META_TOKEN: ${{ secrets.META_TOKEN }}
          GOOGLE_KEY: ${{ secrets.GOOGLE_KEY }}
        run: |
          mkdir -p secrets
          printf '%s' "$META_TOKEN" > secrets/meta_token.txt
          printf '%s' "$GOOGLE_KEY" > secrets/key.json
      - name: Genera dati (cifrati)
        env:
          DASH_PASSWORD: ${{ secrets.DASH_PASSWORD }}
        run: |
          if [ -z "$DASH_PASSWORD" ]; then
            echo "::warning::Secret DASH_PASSWORD mancante: pubblico il data.enc committato (dati non aggiornati). Aggiungi il secret per riattivare il refresh giornaliero."
          else
            python build_data.py
          fi
      - name: Prepara sito
        run: |
          mkdir -p _site
          cp index.html data.enc reiteration-engine.html _site/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deploy
        uses: actions/deploy-pages@v4
